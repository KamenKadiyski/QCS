<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QC Monitoring System{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' fill='%230d6efd' viewBox='0 0 16 16'%3E%3Cpath d='M4 11H2v3h2v-3zm5-4H7v7h2V7zm5-5h-2v12h2V2zm-2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1h-2zM6 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7zm-5 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-3z'/%3E%3C/svg%3E">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .navbar-brand { font-weight: 700; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-check2-square text-primary"></i> QC System
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">

                    {% include 'shared/navigation.html' %}
                </ul>

                <div class="d-flex align-items-center">
                    {% if user.is_authenticated %}
                        <a href="{% url 'reports:daily_stats' %}" class="btn btn-outline-info btn-sm me-3" title="Small stat">
                            <i class="bi bi-bar-chart-fill"></i> Stat
                        </a>
                        <span class="text-light me-3 small">
                            <i class="bi bi-person-circle"></i> {{ user.username }}
                        </span>
                        <form action="{% url 'accounts:logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-sm px-4">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>


    <main class="flex-grow-1">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- Футер -->
    <footer class="bg-white py-4 border-top mt-auto">
        <div class="container text-center">
            <p class="text-muted small mb-0">
                Copyright © 2025-2026
                <a href="mailto:Kamen.Kadiyski@whatmoreuk.com" class="text-primary text-decoration-none fw-medium">
                    Kamen Kadiyski
                </a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
