<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset=“UTF-8“>
    <meta name=“viewport“ content=“width=device-width, initial-scale=1.0“>
    <title>{% block title %}QC Monitoring System{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' fill='%230d6efd' viewBox='0 0 16 16'%3E%3Cpath d='M4 11H2v3h2v-3zm5-4H7v7h2V7zm5-5h-2v12h2V2zm-2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1h-2zM6 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7zm-5 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-3z'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% if user.is_authenticated %}
        <a href="{% url 'reports:daily_stats' %}" class="btn btn-outline-info btn-sm me-3" title="View Statistics"><i class="bi bi-bar-chart-fill"></i> Stats</a>
        <span class="text-light me-2 small">Hello, {{ user.username }}</span>
        <form action="{% url 'accounts:logout' %}" method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-sm">Login</a>
    {% endif %}


</head>
<body class=“bg-light d-flex flex-column min-vh-100“>

    {% include 'shared/navigation.html' %}

    <main class=“flex-grow-1“>
        {% block content %}

        {% endblock %}
    </main>

    <footer class=“bg-white py-3 border-top mt-5“>
        <div class=“container text-center“>
            <span class=“text-muted small“>Copyright © 2025-2026 <a href="mailto:Kamen.Kadiyski@whatmoreuk.com" class="text-decoration-none">Kamen Kadiyski</a></span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
