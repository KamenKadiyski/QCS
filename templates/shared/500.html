{% extends 'shared/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="py-5 border border-light shadow-lg bg-white">
                <div class="mb-4">
                    <i class="bi bi-gear-wide-connected text-danger" style="font-size: 5rem;"></i>
                </div>

                <h1 class="display-4 fw-bold text-dark" style="letter-spacing: -1px;">
                    SYSTEM ERROR 500
                </h1>

                <p class="text-uppercase fw-bold text-muted small mb-4">Technical fault detected in the production engine</p>

                <div class="bg-dark mx-auto mb-5" style="height: 2px; width: 100px;"></div>

                <div class="px-4 mb-5">
                    <div class="alert alert-light border-start border-danger border-4 text-start d-inline-block mx-auto">
                        <p class="mb-0"><strong>Status:</strong> Critical internal exception.</p>
                        <p class="mb-0"><strong>Action:</strong> Automated report sent to the IT Department.</p>
                    </div>
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'accounts:home' %}" class="text-decoration-none text-danger fw-bold border-bottom border-danger pb-1">
                        <i class="bi bi-house-door"></i> HOME
                    </a>
                    <span class="text-muted">|</span>
                    <a href="mailto:sup@whatmoreuk.com" class="text-decoration-none text-dark fw-bold border-bottom border-dark pb-1">
                        CONTACT SUPPORT
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
