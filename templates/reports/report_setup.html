{% extends 'shared/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Configure New Report Type</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <hr>
                <button type="submit" class="btn btn-primary">Save Configuration</button>
                <a href="{% url 'reports:report_list' %}" class="btn btn-link">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
